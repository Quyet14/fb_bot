<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý nhóm · FB Bot</title>
    <script>
      (function () {
        try {
          if (localStorage.getItem('fbbot-theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
          }
        } catch (error) {}
      })();
    </script>
    <link rel="stylesheet" href="../html/styles.css?v=2" />
    <script src="../html/theme.js?v=2" defer></script>
    <script src="../html/api.js?v=4" defer></script>
    <script src="../html/app.js?v=4" defer></script>
  </head>
  <body class="page-groups">
    <div class="app">
      <aside class="sidebar">

        <nav>
          <a href="../html/index.html" class="nav-dashboard">
            <span class="nav-icon">🏠</span><span class="nav-label"> Dashboard</span>
          </a>
          <a href="groups.html" class="nav-groups active">
            <span class="nav-icon">👥</span><span class="nav-label"> Nhóm</span>
          </a>
          <a href="topics.html" class="nav-topics">
            <span class="nav-icon">🏷️</span><span class="nav-label"> Chủ đề</span>
          </a>
          <a href="schedules.html" class="nav-schedules">
            <span class="nav-icon">📅</span><span class="nav-label"> Lịch đăng</span>
          </a>
          <a href="logs.html" class="nav-logs">
            <span class="nav-icon">📋</span><span class="nav-label"> Logs</span>
          </a>
        </nav>
      </aside>
      <main class="main">
        <header class="topbar">
          <div>
            <h2>Quản lý nhóm</h2>
            <p class="sub">Danh sách các nhóm Facebook bot sẽ đăng bài, repost và tương tác.</p>
          </div>
        </header>

        <div id="status"></div>

        <form id="groupForm" class="form-box">
          <h3>Thêm nhóm mới</h3>
          <div class="form-row">
            <input id="groupName" placeholder="Tên nhóm" required />
            <input id="groupUrl" placeholder="URL nhóm (facebook.com/groups/...)" required />
          </div>
          <div class="form-row">
            <input id="groupNote" placeholder="Ghi chú (không bắt buộc)" />
            <button class="btn btn-primary" type="submit" style="flex: 0 0 auto;">+ Lưu nhóm</button>
          </div>
        </form>

        <div class="panel">
          <h3>Danh sách nhóm</h3>
          <table id="groupsTable">
            <thead>
              <tr><th>Tên</th><th>URL</th><th>Ghi chú</th><th></th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </main>
    </div>

    <!-- Modal Sửa nhóm -->
    <div id="editGroupModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center;">
      <div style="background:var(--bg-card); border-radius:12px; padding:28px; width:480px; max-width:95vw;">
        <h3 style="margin:0 0 20px;">Sửa nhóm</h3>
        <div class="field-grid" style="display:flex; flex-direction:column; gap:14px;">
          <label class="field"><span>Tên nhóm</span><input id="editGroupTen" /></label>
          <label class="field"><span>URL nhóm</span><input id="editGroupUrl" /></label>
          <label class="field"><span>Ghi chú</span><input id="editGroupGhiChu" /></label>
        </div>
        <div style="display:flex; gap:12px; margin-top:20px; justify-content:flex-end;">
          <button class="btn btn-secondary" onclick="document.querySelector('#editGroupModal').style.display='none'">Hủy</button>
          <button class="btn btn-primary" onclick="submitEditGroup()">Lưu</button>
        </div>
      </div>
    </div>
    <div id="toastContainer" class="toast-container"></div>
  </body>
</html>
